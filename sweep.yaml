program: train_sweep.py
method: bayes
metric:
  goal: maximize
  name: metrics/mAP50-95(B)
parameters:
  batch:
    values: [8, 16, 32]
  epochs:
    values: [10, 15, 20]
  imgsz:
    values: [320, 480, 640]
  lr0:
    distribution: uniform
    min: 0.0001
    max: 0.01
  weight_decay:
    distribution: uniform
    min: 0.0001
    max: 0.001

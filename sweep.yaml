program: train_sweep.py
method: bayes
metric:
  goal: maximize
  name: metrics/mAP50-95(B)
parameters:
  model:
    values: ["yolov8n.pt", "yolov8s.pt", "yolov8m.pt"]
  batch:
    values: [8, 16, 32]
  epochs:
    values: [10, 15, 20]
  imgsz:
    values: [320, 480, 640]
  lr0:
    distribution: uniform
    min: 0.0001
    max: 0.01
  weight_decay:
    distribution: uniform
    min: 0.0001
    max: 0.001
  # 학습 중 이미지 로깅 주기 (매 N 배치마다)
  log_img_every_n_batch:
    values: [10, 20, 50]
